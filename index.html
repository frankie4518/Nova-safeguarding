<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>NOVA Safeguarding — Coming Soon</title>
		<meta name="description" content="NOVA Safeguarding — Coming soon site." />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
		<style>
			:root{
				--bg1:#0f172a; --bg2:#021124; --accent:#7c3aed; --muted:#bcd4e6;
			}
			html,body{height:100%;}
			body{
				margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Arial; color:#e6f0fb;
				background:linear-gradient(130deg,var(--bg1),var(--bg2));
				overflow:hidden; -webkit-font-smoothing:antialiased;
			}

			/* gradient overlay animation */
			.gradient-anim{
				position:fixed; inset:0; z-index:0; mix-blend-mode:screen; opacity:0.9;
				background: linear-gradient(120deg, rgba(124,58,237,0.25), rgba(14,165,233,0.18), rgba(16,185,129,0.14));
				animation: shift 12s linear infinite;
				filter: blur(40px);
			}
			@keyframes shift{0%{transform:translateY(0) rotate(0);}50%{transform:translateY(-6%) rotate(2deg);}100%{transform:translateY(0) rotate(0);}}

			/* floating glass blobs */
			.blob{
				position:fixed; border-radius:40% 60% 30% 70% / 60% 30% 70% 40%;
				filter: blur(26px) saturate(130%);
				opacity:0.65; transform:translate3d(0,0,0);
			}
			.blob.a{width:520px;height:420px; left:-10%; top:10%; background:linear-gradient(90deg,#6ee7b7, #60a5fa)}
			.blob.b{width:360px;height:360px; right:-8%; bottom:8%; background:linear-gradient(90deg,#7c3aed,#06b6d4); animation: floatB 10s ease-in-out infinite;}
			@keyframes floatB{0%{transform:translateY(0) rotate(0);}50%{transform:translateY(-40px) rotate(6deg);}100%{transform:translateY(0) rotate(0);}}

			/* center card */
			.wrap{position:relative; z-index:10; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:48px 20px;}
			.card{width:100%; max-width:920px; text-align:center; background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02)); border-radius:20px; padding:48px; box-shadow: 0 10px 40px rgba(2,6,23,0.6); backdrop-filter: blur(8px) saturate(120%); border:1px solid rgba(255,255,255,0.04);
			}
			.brand{display:flex; align-items:center; gap:16px; justify-content:center; margin-bottom:8px}
			.logo{width:72px;height:72px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:20px;box-shadow:0 8px 30px rgba(124,58,237,0.18);}
			h1{font-size:clamp(28px,5vw,48px); margin:8px 0 6px; letter-spacing:-0.02em}
			p.lead{color:var(--muted); margin:0 0 24px}

			.countdown{display:flex; gap:12px; justify-content:center; margin-bottom:20px}
			.countdown .item{background:rgba(255,255,255,0.03); padding:10px 14px; border-radius:10px; min-width:64px}
			.countdown .num{font-weight:700; font-size:18px}
			.subscribe{display:flex; gap:8px; justify-content:center; margin-top:14px}
			.subscribe input{padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:transparent; color:#eaf6ff; outline:none; min-width:260px}
			.subscribe button{padding:12px 16px; border-radius:10px; border:0; background:linear-gradient(90deg,var(--accent),#06b6d4); color:white; font-weight:600; cursor:pointer}

			.muted{color:rgba(255,255,255,0.6); font-size:13px; margin-top:10px}

			/* particle canvas sits under content */
			#bgCanvas{position:fixed; inset:0; z-index:1}

			@media (max-width:520px){ .card{padding:28px} .logo{width:56px;height:56px} }
		</style>
	</head>
	<body>
		<div id="bgCanvas"></div>
		<div class="gradient-anim"></div>
		<div class="blob a" aria-hidden="true"></div>
		<div class="blob b" aria-hidden="true"></div>

		<main class="wrap" role="main">
			<section class="card" aria-labelledby="title">
				<div class="brand">
					<div class="logo">NS</div>
					<div style="text-align:left">
						<div style="font-size:12px; color:var(--muted); font-weight:600; letter-spacing:1px">NOVA</div>
						<div style="font-size:11px; color:rgba(255,255,255,0.45)">Safeguarding</div>
					</div>
				</div>
				<h1 id="title">NOVA Safeguarding — Coming Soon</h1>
				<p class="lead">A safer, kinder school community — launching soon. We're building tools to help keep children and staff safe.</p>

				<div class="countdown" aria-hidden="true">
					<div class="item"><div class="num" id="days">--</div><div class="muted">Days</div></div>
					<div class="item"><div class="num" id="hours">--</div><div class="muted">Hours</div></div>
					<div class="item"><div class="num" id="mins">--</div><div class="muted">Mins</div></div>
				</div>

				<form class="subscribe" id="notifyForm" onsubmit="event.preventDefault();showThanks();">
					<input id="email" type="email" placeholder="Your email to get notified" aria-label="email" required>
					<button type="submit">Notify Me</button>
				</form>
				<div class="muted">We respect your privacy. No spam — unsubscribe anytime.</div>
			</section>
		</main>

		<script>
			// simple countdown target (example: 30 days from now)
			(function(){
				const target = new Date(); target.setDate(target.getDate()+30);
				const d=document.getElementById.bind(document);
				function tick(){
					const now=new Date(); const diff=Math.max(0,target-now);
					const days=Math.floor(diff/86400000); const hours=Math.floor(diff%86400000/3600000);
					const mins=Math.floor(diff%3600000/60000);
					d('days').textContent=String(days).padStart(2,'0'); d('hours').textContent=String(hours).padStart(2,'0'); d('mins').textContent=String(mins).padStart(2,'0');
				}
				tick(); setInterval(tick,60000);
			})();

			function showThanks(){
				const email = document.getElementById('email').value;
				const btn = document.querySelector('.subscribe button');
				btn.disabled=true; btn.textContent='Thanks!';
				setTimeout(()=>{ btn.disabled=false; btn.textContent='Notify Me'; document.getElementById('email').value=''; },2200);
			}

			// Particle background using canvas
			(function(){
				const container = document.getElementById('bgCanvas');
				const canvas = document.createElement('canvas');
				canvas.id = 'cParticles'; container.appendChild(canvas);
				const ctx = canvas.getContext('2d');
				let W, H, particles=[];
				function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
				window.addEventListener('resize', resize); resize();

				function rand(min,max){return Math.random()*(max-min)+min}
				function makeParticles(){particles=[]; const count = Math.round((W*H)/70000); for(let i=0;i<count;i++){particles.push({x:rand(0,W),y:rand(0,H),vx:rand(-0.35,0.35),vy:rand(-0.35,0.35),r:rand(0.8,2.2)})}}
				makeParticles();

				function frame(){ ctx.clearRect(0,0,W,H);
					// draw particles
					for(let p of particles){ p.x += p.vx; p.y += p.vy; if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1; ctx.beginPath(); ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
					// draw lines
					for(let i=0;i<particles.length;i++){ for(let j=i+1;j<particles.length;j++){ const a=particles[i], b=particles[j]; const dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy; if(d2<9000){ ctx.strokeStyle='rgba(124,58,237,'+ (0.09 - d2/9000*0.08) +')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); } } }
					requestAnimationFrame(frame);
				}
				frame();

				// regenerate on large resize to keep density
				let rTO; window.addEventListener('resize',()=>{ clearTimeout(rTO); rTO=setTimeout(makeParticles,220); });
			})();
		</script>
	</body>
</html>
